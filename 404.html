<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 | 원케어 배관</title>
  <meta name="robots" content="noindex, follow">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
      background: #f7fafc;
      color: #181c1e;
    }
    .wrap {
      max-width: 520px;
      padding: 40px 24px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      color: #002045;
    }
    p {
      margin: 0 0 28px;
      line-height: 1.7;
      color: #43474e;
    }
    a {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      background: #002045;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>주소가 잘못 입력되었거나 페이지가 이동되었을 수 있습니다.<br>원케어 배관 메인 페이지에서 다시 확인해 주세요.</p>
    <a href="/">메인으로 돌아가기</a>
  </main>
</body>
</html>
